# Extract-phase deny rules: DD paths excluded from standard name generation.
#
# These paths pass the SN_SOURCE_CATEGORIES gate (their node_category is
# quantity, geometry, or coordinate) and the leaf invariant, but they are
# NOT meaningful standard-name candidates.  Instead of inflating the
# compose/review budget on names that reviewers will score 0.2–0.4, we
# filter them at extraction time and record a StandardNameSource with
# status='skipped'.
#
# Note: geometry paths ARE admitted at the category level because some
# (e.g., coil centroid coordinates) yield valid tokamak-universal names.
# This deny list handles the specific geometry subtypes that produce
# overly generic names like "radius_of_annulus" or "alpha_of_oblique".
#
# Path pattern syntax: glob-style (same as unit_overrides.yaml).
#   "*"  matches a single path segment (no "/")
#   "**" matches zero or more path segments
#
# Each rule has:
#   path_pattern:  glob pattern matched against full DD path
#   skip_reason:   machine-readable label (stored on StandardNameSource)
#   reason:        human-readable explanation

version: 1

rules:
  # -------------------------------------------------------------------------
  # Class 1 — Boolean constraint selectors
  #
  # Equilibrium constraint /exact fields are boolean solver-configuration
  # flags that select which constraints are active, not physical quantities.
  # W16-W18 showed names generated from these score 0.22–0.40 in review.
  #
  # Actual DD paths (W21 reconnaissance):
  #   equilibrium/time_slice/constraints/flux_loop/exact          (depth 4)
  #   equilibrium/time_slice/constraints/iron_core_segment/*/exact (depth 5)
  # The LLM was incorrectly generating use_exact_* names from these /exact
  # paths — the deny pattern must match /exact, not use_exact_*.
  # -------------------------------------------------------------------------
  - path_pattern: "equilibrium/time_slice/constraints/**/exact"
    skip_reason: "boolean_constraint_selector"
    reason: >-
      Boolean constraint selector for equilibrium solver; not a physical
      quantity.  The /exact field enables/disables a specific constraint —
      should not receive a standard name.  Note: the LLM generates names
      starting with use_exact_* from these paths, but the deny gate must
      match the DD path (ending in /exact), not the generated name.

  # -------------------------------------------------------------------------
  # Class 2 — Generic cross-section geometry primitives
  #
  # Cross-section geometry subtypes (oblique, rectangle, annulus,
  # arcs_of_circle, thick_line) exist across ~35 IDSs (pf_active,
  # pf_passive, ferritic, ic_antennas, coils_non_axisymmetric, etc.)
  # and produce overly generic names like "radius_of_annulus" or
  # "alpha_of_oblique".  These are engineering design parameters of
  # specific machine components — not tokamak-universal physics quantities.
  #
  # W38 reconnaissance: 134 leaf paths across these subtypes, ALL under
  # node_category='geometry'.  Broad ** patterns replace the original 24
  # per-IDS rules (pf_active/pf_passive only).
  #
  # Local coordinate frame unit vectors (x1/x2/x3_unit_vector) are also
  # excluded — these are abstract reference frame definitions, not
  # measurable quantities.  279 leaf paths across diagnostic IDSs.
  # -------------------------------------------------------------------------

  - path_pattern: "**/geometry/oblique/*"
    skip_reason: "generic_cross_section_geometry"
    reason: >-
      Oblique cross-section geometry parameters (angles, dimensions) —
      generic geometric primitives that produce names like "alpha_of_oblique"
      without tokamak-universal meaning.

  - path_pattern: "**/geometry/rectangle/*"
    skip_reason: "generic_cross_section_geometry"
    reason: >-
      Rectangle cross-section geometry (height, width) — generic primitives
      that need hardware context to be meaningful.

  - path_pattern: "**/geometry/annulus/*"
    skip_reason: "generic_cross_section_geometry"
    reason: >-
      Annulus cross-section geometry (inner/outer radius) — produces names
      like "radius_of_annulus" without identifying the component.

  - path_pattern: "**/geometry/arcs_of_circle/*"
    skip_reason: "generic_cross_section_geometry"
    reason: >-
      Arc-of-circle cross-section geometry (radius, curvature) — generic
      geometric primitive, not a standalone physics quantity.

  - path_pattern: "**/geometry/thick_line/**"
    skip_reason: "generic_cross_section_geometry"
    reason: >-
      Thick-line cross-section geometry (first_point/r, first_point/z,
      second_point/r, etc.) — engineering design parameter describing
      a line segment's endpoints and thickness.

  - path_pattern: "**/x1_unit_vector/*"
    skip_reason: "local_coordinate_frame"
    reason: >-
      Local coordinate frame unit vector component — abstract reference
      frame definition, not a measurable physics or geometry quantity.

  - path_pattern: "**/x2_unit_vector/*"
    skip_reason: "local_coordinate_frame"
    reason: >-
      Local coordinate frame unit vector component — abstract reference
      frame definition, not a measurable physics or geometry quantity.

  - path_pattern: "**/x3_unit_vector/*"
    skip_reason: "local_coordinate_frame"
    reason: >-
      Local coordinate frame unit vector component — abstract reference
      frame definition, not a measurable physics or geometry quantity.

  # -------------------------------------------------------------------------
  # Class 3 — Force/weight combination matrices
  #
  # Control-system parameters: matrices describing how active coil forces
  # are combined.  Not measurable physics quantities.
  # -------------------------------------------------------------------------
  - path_pattern: "**/force_self_per_unit_length"
    skip_reason: "control_system_parameter"
    reason: >-
      Self-force per unit length in coil force combination — control-system
      engineering parameter, not a physics quantity.

  - path_pattern: "**/force_other_per_unit_length"
    skip_reason: "control_system_parameter"
    reason: >-
      Cross-force per unit length in coil force combination — control-system
      engineering parameter, not a physics quantity.

  # -------------------------------------------------------------------------
  # Class 4 — Metadata uncertainty / error index fields
  #
  # W20A/W20B found names of the form uncertainty_index_of_* scoring ~0.23–
  # 0.33.  These come from DD paths ending in *_error_index, which are
  # metadata bookkeeping fields (indices into a homogeneous error array),
  # not physical quantities.
  #
  # W22A reconnaissance: all 9853 *_error_index paths have node_category=error
  # which is already excluded by the SN_SOURCE_CATEGORIES gate.  The
  # **/*_error_index rule below adds an explicit audit-trail entry and
  # provides forward-looking protection should the DD category assignment
  # change.  Real DD paths (W22A sample):
  #   tf/field_map/b_field_r/values_error_index
  #   ferritic/object/time_slice/b_field_z_error_index
  #   amns_data/process/charge_state/table_0d_error_index
  #
  # The **/uncertainty_index* rule is retained as forward-looking protection
  # for any future path literally named uncertainty_index*.
  # -------------------------------------------------------------------------
  - path_pattern: "**/*_error_index"
    skip_reason: "error_index_metadata"
    reason: >-
      Error index metadata field — bookkeeping reference into a shared error
      array (e.g. values_error_index, table_0d_error_index).  Not a physical
      quantity; node_category=error already excludes these from the
      SN_SOURCE_CATEGORIES gate.  This rule adds an explicit audit-trail
      entry and guards against future category reassignment.

  - path_pattern: "**/uncertainty_index*"
    skip_reason: "metadata_uncertainty_index"
    reason: >-
      Uncertainty index metadata field — bookkeeping reference into a shared
      error array, not a physical quantity.

  # -------------------------------------------------------------------------
  # Class 6 — Temporal coordinate arrays
  #
  # DD /time paths have node_category=coordinate, which IS included in
  # SN_SOURCE_CATEGORIES (quantity, geometry, coordinate).  This means all
  # 578+ time coordinate arrays in the DD are extracted as SN candidates.
  #
  # W20B: 36 MFS /time paths produced 9 spurious time_of_* names (score
  # ~0.2–0.35).  Time arrays are dimension coordinates for time-varying data,
  # not physical quantities deserving a standard name.
  #
  # W22A reconnaissance: top-level IDS time arrays (<ids>/time, depth=1)
  # are legitimate coordinate references; they are NOT caught by these rules.
  # Nested time arrays (depth≥2) are measurement/profile time axes:
  #   magnetics/bpol_probe/field/time       (depth 3 — signal time coord)
  #   pf_active/circuit/current/time        (depth 3 — measurement time axis)
  #   equilibrium/time_slice/time           (depth 2 — time_slice timestamp)
  #   magnetics/ip/time                     (depth 2 — IP signal time coord)
  # -------------------------------------------------------------------------
  - path_pattern: "*/*/time"
    skip_reason: "temporal_coordinate"
    reason: >-
      Depth-2 time coordinate array — dimension axis for a measurement or
      profile structure, not a physical quantity.  Only top-level <ids>/time
      arrays (depth 1) are exempted from this class.

  - path_pattern: "*/*/**/time"
    skip_reason: "temporal_coordinate"
    reason: >-
      Deeply nested time coordinate array (depth≥3) — dimension axis for
      measurement data, not a physical quantity.

  # -------------------------------------------------------------------------
  # Class 5 — GGD structural grid object geometry
  #
  # General Grid Description (GGD) object geometry fields are structural
  # mesh-topology descriptors, not physics quantities.  W20A/W20B found
  # names of the form grid_object_geometry* scoring ~0.175–0.235.
  #
  # Actual DD paths (W21 reconnaissance, 229 total):
  #   distribution_sources/source/ggd/grid/space/objects_per_dimension/object/geometry
  #   edge_profiles/grid_ggd/space/objects_per_dimension/object/geometry
  #   ... (across many IDSs with GGD grids)
  # Also: geometry_2d, geometry_content/index, geometry_content/name, etc.
  # Pattern: match any path containing objects_per_dimension/**/geometry*.
  # -------------------------------------------------------------------------
  - path_pattern: "**/objects_per_dimension/object/geometry*"
    skip_reason: "ggd_structural_geometry"
    reason: >-
      GGD grid object geometry descriptor — structural mesh-topology field,
      not a measurable physics quantity.

  - path_pattern: "**/objects_per_dimension/geometry_content*"
    skip_reason: "ggd_structural_geometry"
    reason: >-
      GGD grid geometry content descriptor — structural mesh-topology field,
      not a measurable physics quantity.

  - path_pattern: "**/objects_per_dimension/geometry_content/**"
    skip_reason: "ggd_structural_geometry"
    reason: >-
      GGD grid geometry content sub-fields (name, index, description) —
      structural mesh-topology metadata, not a physics quantity.

  # -------------------------------------------------------------------------
  # Class 7 — GGD subgrid metadata
  #
  # W24 rotation on edge_plasma_physics revealed two categories of non-physics
  # GGD paths:
  #
  # (a) grid_index / grid_subset_index fields within ggd/* arrays — integer
  #     indices that reference which grid definition and subset applies to the
  #     stored values.  These are back-references into the grid_ggd topology
  #     section, not physical observables.  Real DD paths (W24 recon):
  #       edge_profiles/ggd/a_field/grid_index          (INT_0D)
  #       edge_profiles/ggd/a_field/grid_subset_index   (INT_0D)
  #       edge_profiles/ggd/b_field/grid_index          (INT_0D)
  #       edge_profiles/ggd/j_total/grid_subset_index   (INT_0D)
  #
  # (b) grid_ggd/** — the complete grid topology subtree defining spaces,
  #     subsets, coordinate types, geometry type identifiers, and element
  #     object references.  None of these carry physics values; all are
  #     structural mesh metadata.  Real DD paths (W24 recon):
  #       edge_profiles/grid_ggd/grid_subset/dimension
  #       edge_profiles/grid_ggd/grid_subset/element/object/index
  #       edge_profiles/grid_ggd/space/coordinates_type
  #       edge_profiles/grid_ggd/identifier/index
  #       edge_profiles/grid_ggd/path
  #
  # Note: GGD physics value fields (edge_profiles/ggd/j_total/radial,
  # edge_profiles/ggd/pressure_thermal/values, etc.) are NOT denied.
  # The _on_ggd suffix anti-pattern in W24 names from physics GGD paths
  # requires Option A (register on_ggd as ISN locus specifier) — flagged
  # as W26 architect work.
  # -------------------------------------------------------------------------
  - path_pattern: "**/ggd/**/grid_index"
    skip_reason: "ggd_subgrid_metadata"
    reason: >-
      GGD grid index back-reference — integer pointing to which grid_ggd
      definition applies to a stored field.  Structural bookkeeping, not a
      physical quantity.

  - path_pattern: "**/ggd/**/grid_subset_index"
    skip_reason: "ggd_subgrid_metadata"
    reason: >-
      GGD grid subset index — integer pointing to which grid_ggd subset
      contains the stored field values.  Structural bookkeeping, not a
      physical quantity.

  - path_pattern: "**/grid_ggd/**"
    skip_reason: "ggd_subgrid_metadata"
    reason: >-
      GGD grid topology subtree — defines spaces, subsets, coordinate type
      identifiers, geometry type identifiers, and element object references.
      All paths under grid_ggd are structural mesh metadata, not physical
      observables.  Physics values live under ggd/* (not grid_ggd/*).

  # -------------------------------------------------------------------------
  # Class 8 — Configuration flag pseudo-quantities
  #
  # Boolean configuration switches under */model/* and similar paths that
  # the DD classifier marks as quantity.  They describe how a calculation
  # was set up, not what was measured.
  # 26 paths confirmed (87% in gyrokinetics IDS).
  # Mean reviewer score on leaked composed names: 0.324 (deep RED).
  #
  # Matching criteria (ALL must hold):
  #   - Any path (glob **)
  #   - data_type is INT_0D or INT_1D
  #   - units are empty/None/"-"
  #   - documentation contains flag-style language
  # -------------------------------------------------------------------------
  - path_pattern: "**"
    data_type_in:
      - "INT_0D"
      - "INT_1D"
    units_empty: true
    doc_contains_any:
      - "Flag = 1"
      - "Flag = 0"
      - "Flag if"
      - "1 if"
      - "0 if not"
    status: "not_physical_quantity"
    skip_reason: "configuration_flag"
    reason: >-
      Boolean configuration flag (INT data type, no units, flag-style
      documentation).  Describes calculation setup, not a physical quantity.