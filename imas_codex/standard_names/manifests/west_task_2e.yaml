# =============================================================================
# Standard-Name source manifest  ·  schema_version 1
# =============================================================================
# Machine-consumable input for `sn run --focus-file <this>` (proposed) and the
# accepted-name PR-subset selector.  Every entry is a DD **v4** nameable source
# id (an IDS-relative path), pre-filtered to standard-name-eligible physical,
# geometric, and coordinate quantities.  Signal containers are collapsed to the
# nameable parent (e.g. `magnetics/ip`, not `magnetics/ip/data`).
#
# Provenance: derived from the WEST production DD-path usage listing
# (Task 2e DB analysis, shot 62253); v3-era paths resolved to DD v4 via the
# imas-dd migration data and validated against the imas-codex DD graph.
# =============================================================================

schema_version: 1
name: west-task-2e
title: WEST production DD paths (Task 2e DB analysis)
description: >-
  DD paths actively populated in the WEST IMAS database, resolved to DD v4 and
  filtered to standard-name-eligible physical / geometric / coordinate
  quantities. Drives focused `sn run` mop-up so every eligible WEST source
  acquires an accepted standard name, and selects the accepted-name subset to
  PR upstream to imas-standard-names for the first human review gate.

provenance:
  facility: WEST
  source_document: research/west/Task_2e_WEST_DB_analysis_20251113.xlsx
  reference_shot: 62253
  dd_version_target: "4.0.0"
  prepared_utc: "2026-07-21"
  # Eligibility mirrors imas_codex.core.node_categories.SN_SOURCE_CATEGORIES
  # {quantity, geometry, coordinate}; structural/metadata/error/identifier/
  # fit_artifact/representation nodes are excluded (see exclusions sidecar).
  eligibility_policy: sn_source_categories
  # Path form: DD source id (IDS-relative); signal '/data' leaves collapsed
  # to their nameable parent container.
  path_form: dd_source_id

counts:
  raw_leaves: 744          # all leaves listed across 22 IDS sheets
  after_structural_filter: 507   # minus ids_properties/* and code/*
  eligible_sources: 355       # distinct nameable v4 sources (this file)
  renamed_v3_to_v4: 61
  removed_no_v4_equivalent: 22
  excluded_ineligible: 114

