<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180" role="img" aria-labelledby="title desc">
  <title id="title">Plan 36 migration status</title>
  <desc id="desc">A high-contrast phase diagram showing phases 0 to 3 settled, phase 4 validation open, phase 4d derived-parent lifecycle blocked, and phases 5 and 6 still open.</desc>
