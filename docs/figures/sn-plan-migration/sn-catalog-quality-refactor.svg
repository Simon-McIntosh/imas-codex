  <rect x="806" y="74" width="70" height="70" rx="8" fill="#fff7ed" stroke="#c2410c"/>
  <text x="818" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">5–6</text>
  <text x="818" y="120" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Open</text>

  <path d="M142 109 H160 M278 109 H296 M414 109 H432 M550 109 H568 M686 109 H704 M790 109 H806" stroke="#6b7280" stroke-width="2" fill="none"/>
