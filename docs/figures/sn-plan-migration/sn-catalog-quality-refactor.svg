  <text x="24" y="48" font-family="system-ui, sans-serif" font-size="13" fill="#374151">Green = settled groundwork; amber = validation/export still open; red = blocking derived-parent lifecycle gap.</text>

  <rect x="24" y="74" width="118" height="70" rx="8" fill="#f0fdf4" stroke="#15803d"/>
  <text x="38" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Phase 0</text>
  <text x="38" y="120" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Postfix grammar</text>

  <rect x="160" y="74" width="118" height="70" rx="8" fill="#f0fdf4" stroke="#15803d"/>
  <text x="174" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Phase 1</text>
  <text x="174" y="120" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Schema &amp; export</text>

  <rect x="296" y="74" width="118" height="70" rx="8" fill="#f0fdf4" stroke="#15803d"/>
  <text x="310" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Phase 2</text>
  <text x="310" y="120" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Link rebuild</text>

  <rect x="432" y="74" width="118" height="70" rx="8" fill="#f0fdf4" stroke="#15803d"/>
  <text x="446" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Phase 3</text>
  <text x="446" y="120" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Prompt/rubric</text>

  <rect x="568" y="74" width="118" height="70" rx="8" fill="#fff7ed" stroke="#c2410c"/>
