<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">SN deployment readiness snapshot</title>
  <desc id="desc">Bar chart showing the 2026-06-04 name-score distribution and the three release conditions for a conditional-go verdict.</desc>
  <rect x="0" y="0" width="960" height="360" fill="#ffffff"/>
  <text x="32" y="34" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">SN readiness snapshot — audited 2026-06-04</text>
  <text x="32" y="56" font-family="system-ui, sans-serif" font-size="13" fill="#374151">Distribution of accepted-name reviewer scores (left) and release conditions for a production v1 cut (right).</text>

  <rect x="32" y="80" width="500" height="240" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="6"/>
  <text x="48" y="104" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Accepted-name score bins</text>
  <text x="48" y="122" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563">155 accepted names in the frozen study snapshot</text>

  <line x1="188" y1="132" x2="188" y2="294" stroke="#9ca3af" stroke-width="1"/>
  <line x1="188" y1="294" x2="492" y2="294" stroke="#111827" stroke-width="1"/>

  <text x="48" y="158" font-family="system-ui, sans-serif" font-size="13" fill="#111827">≥ 0.90</text>
  <rect x="188" y="144" width="240" height="18" fill="#2563eb" rx="3"/>
  <text x="438" y="158" font-family="system-ui, sans-serif" font-size="13" fill="#111827">123 (79%)</text>

  <text x="48" y="192" font-family="system-ui, sans-serif" font-size="13" fill="#111827">0.80–0.90</text>
  <rect x="188" y="178" width="29" height="18" fill="#60a5fa" rx="3"/>
  <text x="227" y="192" font-family="system-ui, sans-serif" font-size="13" fill="#111827">15 (10%)</text>

  <text x="48" y="226" font-family="system-ui, sans-serif" font-size="13" fill="#111827">0.65–0.80</text>
  <rect x="188" y="212" width="21" height="18" fill="#93c5fd" rx="3"/>
  <text x="219" y="226" font-family="system-ui, sans-serif" font-size="13" fill="#111827">11 (7%)</text>

  <text x="48" y="260" font-family="system-ui, sans-serif" font-size="13" fill="#111827">0.50–0.65</text>
  <rect x="188" y="246" width="3" height="18" fill="#f59e0b" rx="3"/>
  <text x="201" y="260" font-family="system-ui, sans-serif" font-size="13" fill="#111827">1 (0.6%)</text>

  <text x="48" y="294" font-family="system-ui, sans-serif" font-size="13" fill="#111827">&lt; 0.50</text>
  <rect x="188" y="280" width="10" height="18" fill="#dc2626" rx="3"/>
  <text x="208" y="294" font-family="system-ui, sans-serif" font-size="13" fill="#111827">5 (3%)</text>

  <rect x="564" y="80" width="364" height="240" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="6"/>
  <text x="580" y="104" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Release verdict</text>
  <rect x="580" y="120" width="152" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="596" y="140" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">CONDITIONAL-GO</text>
  <text x="580" y="168" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Production release is justified only if all three conditions are cleared.</text>

  <circle cx="592" cy="204" r="7" fill="#dc2626"/>
  <text x="608" y="209" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Implement or formally defer Phase 6 derived-parent deletion.</text>

  <circle cx="592" cy="238" r="7" fill="#f59e0b"/>
  <text x="608" y="243" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Resolve the accepted low-score names before catalog freeze.</text>

  <circle cx="592" cy="272" r="7" fill="#f59e0b"/>
  <text x="608" y="277" font-family="system-ui, sans-serif" font-size="13" fill="#111827">Clean up or explicitly own the exhausted-name tail.</text>

  <text x="580" y="304" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563">The strong high-score tail shows the core pipeline works; the release risk is lifecycle cleanup, not end-to-end viability.</text>
</svg>
